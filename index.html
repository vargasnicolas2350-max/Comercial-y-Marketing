<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Comercial y Marketing</title>

<style>
:root{
  --verde-cancha:#0b3d2e;
  --verde-oscuro:#062419;
  --dorado:#ffd700;
  --colombia:#ffcd00;
  --suiza:#ce1126;
  --blanco:#ffffff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI', Arial, sans-serif;
  min-height:100vh;
  background:
    radial-gradient(circle at 50% 0%, rgba(255,215,0,.08), transparent 60%),
    linear-gradient(rgba(6,36,25,.88),rgba(6,36,25,.93)),
    url("https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&w=1600&q=80");
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  color:white;
  padding-bottom:40px;
}

.container{
  max-width:900px;
  margin:auto;
  padding:30px 20px;
}

h1{
  text-align:center;
  font-size:clamp(24px,5vw,36px);
  letter-spacing:1px;
  text-shadow:0 2px 10px rgba(0,0,0,.5);
  margin-bottom:6px;
}

.subtitle{
  text-align:center;
  margin-bottom:25px;
  color:#cfd8d4;
  font-size:15px;
  letter-spacing:2px;
  text-transform:uppercase;
}

.card{
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.15);
  border-radius:20px;
  padding:28px;
  margin-bottom:22px;
  box-shadow:0 10px 30px rgba(0,0,0,.35);
}

/* Marcador estilo scoreboard */
.scoreboard{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
  background:var(--verde-oscuro);
  border-radius:14px;
  padding:18px 10px;
  margin-bottom:22px;
  border:1px solid rgba(255,215,0,.25);
}

.team{
  flex:1;
  text-align:center;
}

.team .flag{
  font-size:34px;
  display:block;
  margin-bottom:4px;
}

.team .name{
  font-weight:700;
  font-size:14px;
  letter-spacing:1px;
}

.vs{
  font-weight:900;
  color:var(--dorado);
  font-size:20px;
}

#estadoPronostico{
  text-align:center;
  font-size:16px;
  font-weight:700;
  color:var(--dorado);
  margin-bottom:6px;
}

#contadorTiempo{
  text-align:center;
  font-size:20px;
  font-weight:700;
  color:white;
  margin-bottom:20px;
  letter-spacing:.5px;
}

label{
  display:block;
  font-size:13px;
  color:#cfd8d4;
  margin-top:14px;
  margin-bottom:4px;
  letter-spacing:.5px;
}

input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  font-size:16px;
  background:rgba(255,255,255,.95);
  color:#111;
}

input:focus{
  outline:2px solid var(--dorado);
}

.score{
  display:flex;
  gap:15px;
}

.score > div{
  flex:1;
}

button{
  border:none;
  cursor:pointer;
  border-radius:10px;
  padding:14px;
  font-weight:700;
  font-size:15px;
  transition:transform .15s ease, background .15s ease;
}

button:active{
  transform:scale(.98);
}

#guardarBtn{
  width:100%;
  margin-top:20px;
  background:linear-gradient(135deg,#00c853,#009140);
  color:white;
  letter-spacing:.5px;
}

#guardarBtn:hover:not(:disabled){
  background:linear-gradient(135deg,#00e05e,#00a84a);
}

#guardarBtn:disabled{
  cursor:not-allowed;
}

.pronostico{
  background:rgba(255,255,255,.95);
  color:#111;
  padding:14px 18px;
  border-radius:12px;
  margin-top:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  animation:fadeIn .35s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(6px);}
  to{opacity:1; transform:translateY(0);}
}

.pronostico .marcador{
  font-weight:700;
  color:var(--verde-cancha);
}

.deleteBtn{
  background:#d62828;
  color:white;
  padding:8px 12px;
  font-size:13px;
}

.deleteBtn:hover{
  background:#b91f1f;
}

.contador{
  margin-top:4px;
  margin-bottom:14px;
  color:var(--dorado);
  font-weight:700;
}

.vacio{
  text-align:center;
  color:#cfd8d4;
  padding:20px 0;
  font-style:italic;
}

@media(max-width:700px){
  .score{
    flex-direction:column;
  }
  .pronostico{
    flex-direction:column;
    gap:10px;
    text-align:center;
  }
}
</style>
</head>
<body>

<div class="container">

  <h1>⚽ Polla Comercial y Marketing ⚽</h1>
  <div class="subtitle">Mundial 2026 · octavos de final</div>

  <div class="card">

    <div class="scoreboard">
      <div class="team">
        <span class="flag">🇨🇴</span>
        <span class="name">COLOMBIA</span>
      </div>
      <div class="vs">VS</div>
      <div class="team">
        <span class="flag"SZ</span>
        <span class="name">SUIZA</span>
      </div>
    </div>

    <div id="estadoPronostico"></div>
    <div id="contadorTiempo"></div>

    <label for="nombre">Tu nombre</label>
    <input id="nombre" placeholder="Ej: Tío Carlos">

    <div class="score">
      <div>
        <label for="colombia">Goles Colombia</label>
        <input id="colombia" type="number" min="0" placeholder="0">
      </div>
      <div>
        <label for="suiza">Goles Suiza</label>
        <input id="suiza" type="number" min="0" placeholder="0">
      </div>
    </div>

    <button id="guardarBtn">⚽ Guardar Pronóstico</button>

  </div>

  <div class="card">
    <h2>🏆 Pronósticos registrados</h2>
    <div id="contador" class="contador">0 participantes</div>
    <div id="lista"></div>
  </div>

</div>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://pdicfgdzetykamooblfs.supabase.co",
  "sb_publishable_OFkf6Xc6GFNeaRUnFzf9CA_f9coWbqL"
);

// Fecha y hora de cierre de pronósticos: martes 7 de julio 2026, 3:00 p.m. hora Colombia (UTC-5)
// Cambia esta fecha si el partido se reprograma.
const fechaCierre = new Date("2026-07-07T15:00:00-05:00");

const btn = document.getElementById("guardarBtn");

function actualizarContador(){

  const ahora = new Date();
  const diferencia = fechaCierre - ahora;

  if(diferencia <= 0){

    document.getElementById("estadoPronostico").innerHTML = "🔒 Pronósticos cerrados";
    document.getElementById("contadorTiempo").innerHTML = "El partido ya comenzó";

    btn.disabled = true;
    btn.innerHTML = "🔒 Pronósticos Cerrados";
    btn.style.background = "#666";

    return;
  }

  const dias = Math.floor(diferencia / (1000*60*60*24));
  const horas = Math.floor((diferencia % (1000*60*60*24)) / (1000*60*60));
  const minutos = Math.floor((diferencia % (1000*60*60)) / (1000*60));
  const segundos = Math.floor((diferencia % (1000*60)) / 1000);

  document.getElementById("estadoPronostico").innerHTML = "✅ Pronósticos abiertos";
  document.getElementById("contadorTiempo").innerHTML =
    `⏳ Cierre en ${dias}d ${horas}h ${minutos}m ${segundos}s`;
}

actualizarContador();
setInterval(actualizarContador, 1000);

async function cargarPronosticos(){

  const { data, error } = await supabase
    .from("pronosticos")
    .select("*")
    .order("created_at",{ ascending:false });

  if(error){
    console.error(error);
    return;
  }

  document.getElementById("contador").innerHTML =
    `${data.length} participante(s)`;

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  if(data.length === 0){
    lista.innerHTML = `<div class="vacio">Aún no hay pronósticos. ¡Sé el primero!</div>`;
    return;
  }

  data.forEach(item=>{

    const fila = document.createElement("div");
    fila.className = "pronostico";

    fila.innerHTML = `
      <div>
        <strong>${item.nombre}</strong><br>
        <span class="marcador">🇨🇴 ${item.colombia} - ${item.suiza} 🇬🇭</span>
      </div>
    `;

    lista.appendChild(fila);
  });

}

btn.addEventListener("click", async ()=>{

  // Verificar si la polla ya cerró
  if(new Date() >= fechaCierre){
    alert("🔒 La Polla Familia Peluche ya está cerrada.");
    return;
  }

  const nombre = document.getElementById("nombre").value.trim();
  const colombia = document.getElementById("colombia").value;
  const suiza = document.getElementById("suiza").value;

  if(!nombre){
    alert("Ingresa tu nombre");
    return;
  }

  if(colombia === "" || suiza === ""){
    alert("Ingresa los marcadores");
    return;
  }

  const { error } = await supabase
    .from("Comfenalco")
    .insert({
      nombre,
      colombia: Number(colombia),
      suiza: Number(suiza)
    });

  if(error){
    console.error(error);
    alert(error.message);
    return;
  }

  document.getElementById("nombre").value = "";
  document.getElementById("colombia").value = "";
  document.getElementById("suiza").value = "";

  cargarPronosticos();

});

cargarPronosticos();

</script>

</body>
</html>
